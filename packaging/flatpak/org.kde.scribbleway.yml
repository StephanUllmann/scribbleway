app-id: org.kde.scribbleway
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: scribbleway-overlay
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --own-name=org.kde.scribbleway
  - --talk-name=org.kde.kglobalaccel
  - --talk-name=org.kde.kglobalaccel5
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.Clipboard
  - --talk-name=org.freedesktop.impl.portal.desktop.*
cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/doc
  - /share/man
  - '*.a'
  - '*.la'
modules:
  - name: layer-shell-qt
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
    sources:
      - type: git
        url: https://invent.kde.org/plasma/layer-shell-qt.git
        tag: v6.5.2
        commit: 44dfa3b45ce2d5c6005d86998da23e0bece9e23d
  - name: scribbleway
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
      - -DBUILD_PLASMA_APPLET=OFF
      - -DBUILD_DEB_PACKAGE=OFF
    sources:
      - type: dir
        path: ../..
